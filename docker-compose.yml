services:
  postgres:
    image: postgres:16-alpine
    container_name: talentstan_db
    environment:
      POSTGRES_USER: talentstan
      POSTGRES_PASSWORD: talentstan_dev_2026
      POSTGRES_DB: talentstan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: talentstan_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
